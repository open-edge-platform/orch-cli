---
version: "2"
run:
  build-tags:
    - codeanalysis
linters:
  enable:
    - copyloopvar
    - dogsled
    - gosec
    - misspell
    - nakedret
    - revive
    - unconvert
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)\.go$
        text: Error return value of `.*Close` is not checked
      - path: (.+)\.go$
        text: Error return value of `.*Flush` is not checked
      - path: (.+)\.go$
        text: G115.*
      - path: (.+)\.go$
        text: G101.*
      - path: internal/cli/host\.go$
        text: "var-naming: struct field"
        linters:
          - revive
      - path: internal/cli/schedule\.go$
        text: "var-naming: struct field"
        linters:
          - revive
      - path: internal/cli/.*\.go$
        text: "don't use ALL_CAPS in Go names"
        linters:
          - revive
      - path: pkg/filter/filter\.go$
        text: "type name will be used as filter.FilterTerm"
        linters:
          - revive
      - path: pkg/format/.*\.go$
        text: "avoid package names that conflict with Go standard library"
        linters:
          - revive
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
