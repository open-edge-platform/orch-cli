---
openapi: "3.0.3"
info:
  title: KVM Viewer REST API
  version: "1.0.0"
  description: |
    OpenAPI description of the three REST endpoints served by orch-cli
    on localhost during an active KVM session.

    SCOPE: This spec was derived from the existing implementation in
    internal/cli/kvm_viewer.go and exists solely as input for
    RESTler / FaaS fuzz testing (see test/fuzz/kvm/).
    It is NOT used for Angular client code generation.
    The Angular service (ui/kvm-viewer/src/app/services/kvm.service.ts)
    is hand-written and requires no changes as a result of this spec.

# NOTE: no trailing slash after the port — RESTler double-slashes paths
# when a trailing slash is present (see containers.docker.fuzzing.faas README).
servers:
  - url: "http://localhost:8585"

paths:
  /api/connect:
    post:
      summary: Initiate KVM session connection
      operationId: connectSession
      description: |
        Called by the Angular app on load. Returns the current session state.
        The MPS relay and AMT handshake are already in progress before the
        browser opens, so no request body is needed.
      security:
        - sessionToken: []
      responses:
        "200":
          description: Session state acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateResponse"
        "403":
          description: Missing or invalid X-Session-Token header
        "405":
          description: Method not allowed — POST only

  /api/status:
    get:
      summary: Poll current KVM session state
      operationId: getStatus
      description: |
        Returns the current state of the KVM session. Angular polls this
        endpoint after /api/connect until state becomes "active".
      security:
        - sessionToken: []
      responses:
        "200":
          description: Current session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateResponse"
        "403":
          description: Missing or invalid X-Session-Token header

  /api/disconnect:
    post:
      summary: Disconnect the active KVM session
      operationId: disconnectSession
      description: |
        Called by the Angular app Disconnect button. Closes the AMT relay
        and signals startKVMViewer to run the stop/cleanup path.
      security:
        - sessionToken: []
      responses:
        "200":
          description: Session disconnected successfully
        "403":
          description: Missing or invalid X-Session-Token header
        "405":
          description: Method not allowed — POST only

components:
  schemas:
    StateResponse:
      type: object
      properties:
        state:
          type: string
          description: Current KVM session state
          enum:
            - connecting
            - active
            - disconnected
            - error
      required:
        - state

  securitySchemes:
    sessionToken:
      type: apiKey
      in: header
      name: X-Session-Token
      description: |
        256-bit crypto/rand token injected into index.html as
        window.__ORCH_TOKEN. Angular reads it once and attaches it as the
        X-Session-Token header on every API request. The fuzz server uses
        a fixed well-known value defined in test/fuzz/kvm/token.sh.
