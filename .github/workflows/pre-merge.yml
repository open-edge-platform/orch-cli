name: Pre-Merge CI Pipeline

on:
  pull_request:
    branches:
      - main
      - release-*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-checks:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: "Verify Branch Name"
        uses: open-edge-platform/orch-ci/verify-branch-name@a95228137803b756aae327668c115db235802982  # v2026.1.3
  pre-merge-pipeline:
    needs: pre-checks
    uses: open-edge-platform/orch-ci/.github/workflows/pre-merge.yml@a95228137803b756aae327668c115db235802982  # v2026.1.3
    with:
      bootstrap_tools: "go,gotools,golangci-lint2,nodejs,buf,hadolint,opa"
      run_version_check: true
      run_dep_version_check: false
      run_build: true
      run_lint: true
      run_test: true
      run_validate_clean_folder: false
      run_docker_build: false
      run_artifact: false
  build-kvm:
    name: Build KVM-enabled binary
    needs: pre-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: '1.26.3'
          cache: true
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/kvm-viewer/package-lock.json
      - name: Debug KVM UI build
        run: |
          cd ui/kvm-viewer
          echo "Node version:"
          node --version
          echo "NPM version:"
          npm --version
          npm ci
          echo "Installed Angular packages:"
          npm ls @angular/cli || true
          echo "node_modules/.bin contents:"
          ls -la node_modules/.bin || true
          echo "Check ng binary:"
          which ng || true
          ls -la node_modules/.bin/ng || true
          npm run build
      - name: Build KVM-enabled orch-cli
        run: make build-kvm
  final-check:
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [pre-merge-pipeline, build-kvm]
    env:
      RESULT: ${{ needs.pre-merge-pipeline.result }}
      KVM_RESULT: ${{ needs.build-kvm.result }}
    steps:
      - name: Final Status Check
        run: |
          pre_merge_pipeline_result="${RESULT}"
          kvm_build_result="${KVM_RESULT}"

          echo "Pre-merge pipeline result: $pre_merge_pipeline_result"
          echo "KVM build result:          $kvm_build_result"

          if [ "$pre_merge_pipeline_result" == "success" ] || [ "$pre_merge_pipeline_result" == "skipped" ]; then
            echo "Pre-merge check passed successfully."
          else
            echo "Pre-merge checks failed. PR can't get merged"
            exit 1
          fi

          if [ "$kvm_build_result" == "success" ] || [ "$kvm_build_result" == "skipped" ]; then
            echo "KVM build check passed successfully."
          else
            echo "KVM build failed. PR can't get merged"
            exit 1
          fi
