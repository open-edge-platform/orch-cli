name: Post-Merge CI Pipeline

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  post-merge-pipeline:
    permissions:
      contents: read
      security-events: write
      id-token: write
      actions: read
    uses: open-edge-platform/orch-ci/.github/workflows/post-merge.yml@d17180cb7af62dc10bea371bd0cfdc2ba5bc1f02  # 2026.1.3
    with:
      run_version_check: true
      run_dep_version_check: false
      run_build: true
      run_docker_build: false
      run_docker_push: false
      run_helm_build: false
      run_helm_push: false
      bin_zip_name: Orch-cli-package
      bin_path: ./orch-cli-package.tar.gz
      run_version_tag: ${{ startsWith(github.ref, 'refs/tags/v202') }}
      run_artifact_push: ${{ startsWith(github.ref, 'refs/tags/v202') }}
    secrets:
      SYS_EMF_GH_TOKEN: ${{ secrets.SYS_EMF_GH_TOKEN }}
      NO_AUTH_ECR_PUSH_USERNAME: ${{ secrets.NO_AUTH_ECR_PUSH_USERNAME }}
      NO_AUTH_ECR_PUSH_PASSWD: ${{ secrets.NO_AUTH_ECR_PUSH_PASSWD }}

