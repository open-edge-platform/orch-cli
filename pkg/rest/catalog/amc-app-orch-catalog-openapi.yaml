    get:
      tags:
        - CatalogService
      summary: ListApplications
      description: Gets a list of applications.
      operationId: CatalogService_ListApplications2
      parameters:
        - name: orderBy
          in: query
          description: Names the field to be used for ordering the returned results.
          schema:
            type: string
            title: order_by
            description: (OPTIONAL) Names the field to be used for ordering the returned results.
        - name: filter
          in: query
          description: Expression to use for filtering the results.
          schema:
            type: string
            title: filter
            description: (OPTIONAL) Expression to use for filtering the results.
        - name: pageSize
          in: query
          description: Maximum number of items to return.
          schema:
            type: integer
            title: page_size
            format: int32
            description: (OPTIONAL) Maximum number of items to return.
        - name: offset
          in: query
          description: Index of the first item to return.
          schema:
            type: integer
            title: offset
            format: int32
            description: (OPTIONAL) Index of the first item to return.
        - name: kinds
          in: query
          description: List of application kinds to be returned; empty list means all kinds.
          schema:
            type: array
            items:
              $ref: '#/components/schemas/catalog.v3.Kind'
            title: kinds
            maxItems: 20
            description: (OPTIONAL) List of application kinds to be returned; empty list means all kinds.
        - name: projectName
          in: query
          description: Project name for multi-tenant path routing.
          schema:
            type: string
            title: projectName
            description: (OPTIONAL) Project name for multi-tenant path routing.
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/catalog.v3.ListApplicationsResponse'
    post:
      tags:
        - CatalogService
      summary: CreateApplication
      description: Creates a new application.
      operationId: CatalogService_CreateApplication2
      parameters:
        - name: projectName
          in: query
          description: Project name for multi-tenant path routing.
          schema:
            type: string
            title: projectName
            description: (OPTIONAL) Project name for multi-tenant path routing.
      requestBody:
        description: The registry to create.
        content:
