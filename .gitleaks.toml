# Gitleaks config to allowlist test PKCS12 file
###############################
# Robust gitleaks allowlist for test PKCS12 file
[[allowlists]]
description = "Ignore test PKCS12 file"
paths = [
  '''internal/cli/testdata/sample\.pfx'''
]
rules = ["pkcs12-file"]
